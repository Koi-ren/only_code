#define LED_PIN 16 // LED 핀 번호

bool sendData = true; // 송신할 bool 데이터

void setup() {
  Serial.begin(115200); // 기본 Serial 포트 (USB)
  Serial2.begin(9600, SERIAL_8N1, 16, 17); // Serial2 포트 (TX=17, RX=16)
  pinMode(LED_PIN, OUTPUT);
}

void loop() {
  // 2초마다 bool 값을 송신
  delay(2000);
  Serial2.write(sendData ? '1' : '0');
  Serial.println("보드 A 송신 데이터: " + String(sendData ? "true" : "false"));

  // 수신된 데이터가 있는 경우 처리
  if (Serial2.available()) {
    char receivedChar = Serial2.read();
    bool receivedData = (receivedChar == '1'); // '1'은 true, '0'은 false로 해석

    Serial.print("보드 A 수신된 데이터: ");
    Serial.println(receivedData ? "true" : "false");

    // 수신된 데이터에 따라 LED 상태 변경 (예: true일 때 LED 켜기)
    digitalWrite(LED_PIN, receivedData ? HIGH : LOW);
  }
}
